# Netlify configuration for ThreatPulse Radar.
#
# =====================================================================
# V6.0 DEPLOYMENT TOPOLOGY (two separate Netlify sites)
# =====================================================================
# V6.0 introduces a private sync gateway that lives on its OWN
# Netlify site. The two sites share this repository but use
# different Netlify UI "Base directory" settings:
#
#   Public site (base = repo root, this file)
#     - Vite dashboard (publish = "dist")
#     - Functions: netlify/functions/*.mjs
#     - Owns Blob stores: tpr-dataset, tpr-vulnrichment,
#       tpr-github-advisory, tpr-baseline
#
#     Note on the gateway function (private-sync-gateway.mjs):
#     this file lives in netlify/functions/ as the SINGLE
#     source of truth and is ALSO staged into the gateway
#     subtree for deployment (see scripts/copy-gateway-files.mjs
#     and netlify/gateway/netlify.toml). On the PUBLIC site it
#     will mount at /private/v1/* per its `config.path` export
#     and 500 on every request because
#     THREATPULSE_CREDENTIAL_PEPPER is intentionally absent on
#     the public site. The 500 is the correct behavior: no
#     anonymous request can read the canonical baseline, and
#     the missing pepper prevents any caller (anonymous or
#     authenticated) from succeeding. Netlify Functions v2
#     does not support a per-site function exclusion, so this
#     500-on-the-public-site is the accepted trade-off for
#     keeping one canonical source of truth. The alternative
#     (moving the gateway function to a sibling directory and
#     adding a second `[functions]` path in each netlify.toml)
#     is documented in docs/deployment.md as the migration
#     path if a future operator wants to fully remove the
#     function from the public site's bundle.
#
#   Gateway site (base = netlify/gateway/, see netlify/gateway/netlify.toml)
#     - Functions-only. The build command runs the staging
#       script which copies ONLY the gateway function and its
#       two required shared modules into
#       netlify/gateway/functions-staging/functions/. The public
#       functions are never deployed here.
#     - Reads the public site's tpr-baseline store via cross-site
#       env vars (THREATPULSE_BASELINE_SITE_ID,
#       THREATPULSE_BLOBS_ACCESS_TOKEN). NEVER writes.
#
# The topology is encoded in the repo (netlify/gateway/ subtree
# + scripts/copy-gateway-files.mjs), not in operator memory.
# An operator who creates the gateway site only needs to set
# the Base directory in the Netlify UI; everything else is
# committed to the repo. See docs/deployment.md.
# =====================================================================
#
# v5.0: single serverless function `/.netlify/functions/dataset`.
# v5.0.1: CDN-cacheable function response.
# v5.0.2 / v5.0.3: optional NVD_API_KEY (request header transport).
# v5.1: client-side soft refresh (no server change).
# v5.2: prebuilt dataset store backed by Netlify Blobs.
#        - `dataset.mjs` reads `latest-dataset` first.
#        - `refresh-dataset-background.mjs` runs a manual refresh.
#        - `refresh-dataset-scheduled.mjs` runs on a cron every 30 min.
# v5.2.1: BUNDLING FIX — switch function bundling from
#        `node_bundler = "none"` to `node_bundler = "esbuild"`.
#        Under v5.2's "none" setting Netlify shipped only the
#        entry `.mjs` files to `/var/task/`, so the relative
#        imports `./_shared/{liveBuild,refresh,store}.mjs`
#        inside the deployed functions failed with
#        `Cannot find module '/var/task/_shared/liveBuild.mjs'`.
#        With `esbuild` bundling, every local relative import
#        is inlined into the function output, so the
#        `_shared/` modules ship inside the bundle. External
#        `node_modules` imports (e.g. `@netlify/blobs`) are
#        left as runtime require()s — Netlify zips the
#        `node_modules` folder alongside the function.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# v5.2.1: function bundler set to esbuild globally so the
# `_shared/{liveBuild,refresh,store}.mjs` modules get inlined
# into each function's output bundle. This is the v5.2.1 fix
# for the `_shared/liveBuild.mjs not found at /var/task/`
# deploy-preview crash.
[functions]
  node_bundler = "esbuild"

# v5.0 / v5.0.1 / v5.0.2 / v5.0.3 / v5.2 / v5.2.1 — read
# endpoint. Reads `latest-dataset` blob first, falls back to
# the live CISA → NVD → EPSS build on a cold deploy. Returns
# HTTP 200 with `dataSource: 'prebuilt-store' | 'live-build'`
# and a `refreshInProgress` flag.
#
# v5.2.1: removed the per-function `node_bundler = "none"`
# override. The top-level `[functions] node_bundler =
# "esbuild"` setting now applies.
[functions.dataset]

# v5.2 — manual-refresh background function. Triggered by the
# dashboard's "Refresh live data" button. Netlify background
# functions (filename suffix `-background.mjs`) run with up to
# a 15-minute timeout and return their Response immediately;
# the actual build completes in the background via
# `context.waitUntil`.
[functions.refresh-dataset-background]

# v5.2 — scheduled-refresh function. Runs on the cron schedule
# below (every 30 min). Writes a fresh `latest-dataset` blob so
# the next visitor after the v5.0.1 CDN cache expires gets a
# freshly-built dataset without paying the build cost.
#   `schedule = "*/30 * * * *"` = every 30 minutes on the hour
#   and half-hour. Netlify's scheduled-function TZ is UTC by
#   default; we don't need wall-clock alignment, just
#   "twice per hour".
[functions.refresh-dataset-scheduled]
  schedule = "*/30 * * * *"

# V6.0 — scheduled-refresh function for the canonical baseline.
# The scheduled function is THIN: it only POSTs to the
# refresh-baseline-background function with the
# THREATPULSE_REFRESH_TRIGGER_SECRET. The background function
# does the actual work (OSV ingestion + canonical baseline
# build + publication) and has the 15-minute ceiling.
#   `schedule = "0 * * * *"` = top of every hour. The
# default schedule is hourly per the V6.0 design (decision #1).
# The cron TZ is UTC.
[functions.refresh-baseline-scheduled]
  schedule = "0 * * * *"

# Standard security headers for static `dist/` assets.
# V6.9 — aligned with the Hostinger runtime header baseline.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), cross-origin-isolated=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()"
    X-Frame-Options = "DENY"
    # V6.9 — Content-Security-Policy. The fallback URL
    # is enumerated explicitly (CISA KEV, NVD, FIRST
    # EPSS) so the operator can confirm the exact
    # browser-direct fallbacks enabled by the policy.
    # No `https:`, no `*`, no subdomain wildcards.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://www.cisa.gov https://services.nvd.nist.gov https://api.first.org; worker-src 'self' blob:; manifest-src 'self'; frame-src 'none'"

# Long-cache the fingerprinted Vite assets; keep `index.html`
# at zero so deploys are picked up immediately. (Mirrors the
# Hostinger `.htaccess` rules from the v4 deployment guide.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/radar.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"