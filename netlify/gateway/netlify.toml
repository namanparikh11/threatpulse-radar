# V6.0 — Private sync gateway Netlify site configuration.
#
# This file is for the GATEWAY Netlify site ONLY, not the
# public ThreatPulse Radar site. The public site uses the
# root `netlify.toml`. The two sites deploy from the same
# repo but with different Netlify UI "Base directory"
# settings; the public site's base is the repo root, the
# gateway site's base is `netlify/gateway/`.
#
# Topology (encoded in the repo, not in operator memory):
#
#   Public site (base = repo root)
#     - Vite dashboard (publish = "dist")
#     - netlify.toml at repo root
#     - netlify/functions/{dataset, refresh-dataset-*,
#                         refresh-baseline-scheduled,
#                         refresh-baseline-background}.mjs
#     - Owns Blob stores: tpr-dataset, tpr-vulnrichment,
#                         tpr-github-advisory, tpr-baseline
#
#   Gateway site (base = netlify/gateway/)  <-- this file
#     - Functions-only (no static publish content)
#     - netlify/gateway/netlify.toml   <-- you are here
#     - netlify/gateway/functions-staging/functions/  (output of the build command)
#     - Reads the public site's `tpr-baseline` store via
#       cross-site env vars (THREATPULSE_BASELINE_SITE_ID,
#       THREATPULSE_BLOBS_ACCESS_TOKEN). NEVER writes to
#       any Blob store.
#     - Does NOT run the Vite build, does NOT publish
#       `dist`, does NOT deploy the public functions.
#
# To deploy this as a separate Netlify site:
#   1. In the Netlify UI, create a new site ("threatpulse-gateway"
#      or your chosen name) connected to this repository.
#   2. Site settings -> Build & deploy -> Continuous
#      deployment -> Base directory = `netlify/gateway/`.
#   3. Leave Build command, Publish directory, and Functions
#      directory at the values from this file (do not
#      override them in the UI).
#   4. Site settings -> Environment variables:
#        - THREATPULSE_BASELINE_SITE_ID
#            The public site's Netlify site ID. Used by both
#            store handles.
#        - THREATPULSE_BLOBS_ACCESS_TOKEN
#            Netlify Blobs access token scoped to the public
#            site's `tpr-baseline` store, read-only. Used to
#            read manifests, version manifests, shards, deltas,
#            and source registry.
#        - THREATPULSE_CREDENTIALS_BLOBS_ACCESS_TOKEN
#            Netlify Blobs access token scoped to the public
#            site's SEPARATE `tpr-private-credentials` store,
#            read-only. Used to read consumer credential HMACs
#            at `credentials/<keyId>`. Set this to a DIFFERENT
#            token than THREATPULSE_BLOBS_ACCESS_TOKEN so the
#            blast radius of either token being compromised is
#            limited to one store. If unset, the gateway falls
#            back to THREATPULSE_BLOBS_ACCESS_TOKEN (so an
#            operator with a single multi-store token can use
#            one env var for both stores); the default
#            deployment uses two separate tokens.
#        - THREATPULSE_CREDENTIAL_PEPPER
#            Long random string. Rotating it invalidates every
#            issued credential.
#   5. Do NOT set THREATPULSE_REFRESH_TRIGGER_SECRET (gateway
#      has no scheduled function) or THREATPULSE_OSV_ECOSYSTEMS
#      (gateway does not ingest). Do NOT set NVD_API_KEY or
#      GITHUB_TOKEN (the gateway does not call upstream
#      providers; it only reads the baseline).
#   6. Trigger a deploy. The build command runs the staging
#      script (see below), which copies the gateway function
#      and its two required shared modules into the staging
#      directory. Netlify deploys the staged functions and
#      nothing else.

[build]
  # Run the staging script. It wipes and rebuilds
  # `functions-staging/functions/` from the source-of-truth
  # files in `netlify/functions/`. The staging directory is
  # gitignored and recreated on every deploy.
  command = "node ../../scripts/copy-gateway-files.mjs"
  # The publish directory must exist for Netlify. We use an
  # empty `site/` directory inside the gateway subtree. The
  # functions are deployed from `functions-staging/functions/`
  # (separate from the publish directory), so the function
  # source is never exposed as a static file at the gateway
  # site's URL.
  publish = "site"
  functions = "functions-staging/functions"

[functions]
  # Match the public site's bundler so the same `_shared/*.mjs`
  # relative imports are inlined into the gateway function
  # output. External dependencies (only @netlify/blobs for the
  # gateway) are left as runtime require()s and resolved from
  # the gateway subtree's `node_modules/`.
  node_bundler = "esbuild"
