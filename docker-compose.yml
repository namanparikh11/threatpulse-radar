# V6.2 — ThreatPulse Radar Docker Compose.
#
# This file is OPTIONAL. It documents the container
# deployment path; Netlify and Hostinger Business do
# not need it. The compose file assumes a local
# filesystem-backed deployment; a future S3-backed
# compose file would swap the THREATPULSE_DATA_ROOT
# mount for an S3 sidecar.

services:
  threatpulse-radar:
    build: .
    image: threatpulse-radar:v6-2
    container_name: threatpulse-radar
    restart: unless-stopped
    environment:
      THREATPULSE_STORAGE_BACKEND: filesystem
      THREATPULSE_DATA_ROOT: /var/lib/threatpulse/state
      THREATPULSE_HTTP_HOST: 0.0.0.0
      THREATPULSE_HTTP_PORT: 8787
      NODE_ENV: production
    ports:
      - "8787:8787"
    volumes:
      - threatpulse-state:/var/lib/threatpulse/state
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  threatpulse-state:
